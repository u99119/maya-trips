<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Family travel navigation app with offline support for multiple destinations">
  <meta name="theme-color" content="#2196F3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Family Trips">

  <title>Mayank Family Trips</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
        crossorigin=""/>
  
  <!-- App CSS -->
  <link rel="stylesheet" href="/css/app.css">
  
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <h1 class="route-name" id="routeName">Loading...</h1>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Offline Ready</span>
      </div>
    </div>
  </header>

  <!-- Map Container -->
  <div id="map" class="map-container"></div>

  <!-- Bottom Drawer -->
  <div class="bottom-drawer" id="bottomDrawer">
    <div class="drawer-handle"></div>
    
    <div class="drawer-content">
      <!-- Progress Section -->
      <div class="progress-section">
        <h3>Progress</h3>
        <div class="milestone-progress" id="milestoneProgress">
          <span class="progress-text">Milestone 0 / 0</span>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
        </div>
        <div class="next-milestone" id="nextMilestone">
          <strong>Next:</strong> <span>--</span>
        </div>
      </div>

      <!-- Controls Section -->
      <div class="controls-section">
        <h3>Controls</h3>
        
        <!-- GPS Toggle -->
        <div class="control-item">
          <label class="toggle-switch">
            <input type="checkbox" id="gpsToggle">
            <span class="toggle-slider"></span>
          </label>
          <span class="control-label">GPS Tracking</span>
          <span class="control-info" id="gpsInfo">--</span>
        </div>

        <!-- Battery Saver Mode -->
        <div class="control-item">
          <label class="toggle-switch">
            <input type="checkbox" id="batterySaverToggle">
            <span class="toggle-slider"></span>
          </label>
          <span class="control-label">Battery Saver</span>
        </div>

        <!-- Auto Center -->
        <div class="control-item">
          <label class="toggle-switch">
            <input type="checkbox" id="autoCenterToggle" checked>
            <span class="toggle-slider"></span>
          </label>
          <span class="control-label">Auto Center</span>
        </div>
      </div>

      <!-- Route Layers Section -->
      <div class="layers-section">
        <h3>Route Layers</h3>
        <div class="layer-toggles" id="layerToggles">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- Milestones List -->
      <div class="milestones-section">
        <h3>Milestones</h3>
        <div class="milestones-list" id="milestonesList">
          <!-- Dynamically populated -->
        </div>
      </div>
    </div>
  </div>

  <!-- Recenter Button -->
  <button class="recenter-btn" id="recenterBtn" title="Recenter Map">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </button>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading route data...</p>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
          crossorigin=""></script>
  
  <!-- App JS -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
